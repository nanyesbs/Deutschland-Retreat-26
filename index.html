  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              'heaven-gold': '#BB9446',
              'gold': '#D3B962',
            }
          },
          fontFamily: {
            avenir: ['"Avenir Next"', 'Avenir', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            'card': '2px',
            'modal': '4px',
            'button': '2px',
          },
          boxShadow: {
            'card': '0 4px 20px rgba(0,0,0,0.08)',
            'modal': '0 20px 50px rgba(0,0,0,0.3)',
            'glow-sm': '0 0 10px rgba(187, 148, 70, 0.3)',
            'glow-md': '0 0 20px rgba(187, 148, 70, 0.4)',
            'glow': '0 0 15px rgba(187, 148, 70, 0.3)',
            'neu-flat': '8px 8px 16px var(--neu-shadow-dark), -8px -8px 16px var(--neu-shadow-light)',
            'neu-pressed': 'inset 6px 6px 12px var(--neu-shadow-dark), inset -6px -6px 12px var(--neu-shadow-light)',
            'neu-concave': 'inset 4px 4px 8px var(--neu-shadow-dark), inset -4px -4px 8px var(--neu-shadow-light)',
            'neu-convex': '6px 6px 12px var(--neu-shadow-dark), -6px -6px 12px var(--neu-shadow-light)',
          },
          animation: {
            'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'reveal': 'reveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-slow': 'pulseSlow 3s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: 0 },
              '100%': { opacity: 1 },
            },
            slideUp: {
              '0%': { opacity: 0, transform: 'translateY(20px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
            reveal: {
              '0%': { clipPath: 'inset(0 100% 0 0)' },
              '100%': { clipPath: 'inset(0 0 0 0)' },
            },
            pulseSlow: {
              '0%, 100%': { opacity: 1, transform: 'scale(1)' },
              '50%': { opacity: 0.85, transform: 'scale(0.98)' },
            }
          }
        },
      },
    }
  </script>
